name: Deploy to GitHub Pages
on:
    push:
        branches: 'main'

jobs:
    build_site:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Install Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: |
                      gpx/package-lock.json
                      website/package-lock.json

            - name: Install dependencies for gpx
              run: npm install --prefix gpx

            - name: Build gpx
              run: npm run build --prefix gpx

            - name: Install dependencies for website
              run: npm install --prefix website

            - name: Build website
              env:
                  BASE_PATH: ''
                  # Public build-time configuration (see website/.env.example).
                  # These values are baked into the client bundle and are not
                  # secrets; the MapTiler key is origin-restricted in the
                  # MapTiler dashboard.
                  PUBLIC_MAPTILER_KEY: ${{ secrets.PUBLIC_MAPTILER_KEY }}
                  PUBLIC_BROUTER_URL: https://brouter.de/brouter
                  PUBLIC_ELEVATION_TILE_URL: https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png
              run: |
                  npm run build --prefix website

            - name: Upload Artifacts
              uses: actions/upload-pages-artifact@v5
              with:
                  path: 'website/build/'

    deploy:
        needs: build_site
        runs-on: ubuntu-latest

        permissions:
            pages: write
            id-token: write

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Deploy
              id: deployment
              uses: actions/deploy-pages@v4
