name: Deploy to GitHub Pages
on:
    push:
        branches: 'main'

# Allow only one Pages deployment at a time. New pushes queue behind an
# in-flight deployment instead of cancelling it, so a retry during a GitHub
# Pages incident can never race a stuck deployment.
concurrency:
    group: 'pages'
    cancel-in-progress: false

jobs:
    build_site:
        runs-on: ubuntu-latest
        # configure-pages (with enablement) needs pages/id-token write; keep
        # contents:read for the checkout since naming any permission drops the
        # rest to none.
        permissions:
            contents: read
            pages: write
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            # Establish GitHub Pages with "GitHub Actions" as the build source
            # (idempotent if already enabled). Without this step the deploy job
            # can fail with "Deployment failed, try again later" on a repo whose
            # Pages source was never set to Actions.
            - name: Setup Pages
              uses: actions/configure-pages@v5
              with:
                  enablement: true

            - name: Install Node.js
              uses: actions/setup-node@v6
              with:
                  # Match the CI workflow so deploys build what CI tested.
                  node-version: 22
                  cache: npm
                  cache-dependency-path: |
                      gpx/package-lock.json
                      website/package-lock.json

            # Use npm ci (lockfile-exact, reproducible) rather than npm install,
            # and run the gpx tests before building so a broken engine never
            # reaches production.
            - name: Install dependencies for gpx
              run: npm ci --prefix gpx

            - name: Build gpx
              run: npm run build --prefix gpx

            - name: Test gpx
              run: npm test --prefix gpx

            - name: Install dependencies for website
              run: npm ci --prefix website

            - name: Build website
              env:
                  # Project site on GitHub Pages is served under /adventure-planner;
                  # must be dropped (or set to '') when moving to a custom domain.
                  BASE_PATH: '/adventure-planner'
                  # Public build-time configuration (see website/.env.example).
                  # These values are baked into the client bundle and are not
                  # secrets; the MapTiler key is origin-restricted in the
                  # MapTiler dashboard.
                  PUBLIC_MAPTILER_KEY: ${{ secrets.PUBLIC_MAPTILER_KEY }}
                  PUBLIC_BROUTER_URL: https://brouter.de/brouter
                  PUBLIC_ELEVATION_TILE_URL: https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png
              run: |
                  npm run build --prefix website

            - name: Upload Artifacts
              uses: actions/upload-pages-artifact@v5
              with:
                  path: 'website/build/'

    deploy:
        needs: build_site
        runs-on: ubuntu-latest

        permissions:
            pages: write
            id-token: write

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Deploy
              id: deployment
              uses: actions/deploy-pages@v4
